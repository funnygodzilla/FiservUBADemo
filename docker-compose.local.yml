version: '3.9'
services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  postgres-uba:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ubadb
      POSTGRES_USER: ubadb
      POSTGRES_PASSWORD: ubadb
    ports:
      - "5432:5432"

  postgres-audit:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: auditdb
      POSTGRES_USER: auditdb
      POSTGRES_PASSWORD: auditdb
    ports:
      - "5433:5432"
