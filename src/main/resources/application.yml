spring:
  application:
    name: account-service
  profiles:
    active: dev
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:uba_account_db}
    username: ${DB_USER:root}
    password: ${DB_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQL8Dialect
        jdbc:
          batch_size: 20
          fetch_size: 50
        order_inserts: true
        order_updates: true

  security:
    jwt:
      secret: ${JWT_SECRET:your-secret-key-change-in-production-min-256-bits}
      expiration: ${JWT_EXPIRATION:86400000}

server:
  port: ${SERVER_PORT:8082}
  servlet:
    context-path: /api/v1
  compression:
    enabled: true
    min-response-size: 1024

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_SERVER:http://localhost:8761/eureka/}
    registry-fetch-interval-seconds: 30
    instance-info-replication-interval-seconds: 30
  instance:
    prefer-ip-address: true
    lease-renewal-interval-in-seconds: 30
    lease-expiration-duration-in-seconds: 90
    hostname: ${HOSTNAME:localhost}
    metadata-map:
      management:
        context-path: /actuator

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus,env
      base-path: /actuator
  endpoint:
    health:
      show-details: when-authorized
      probes:
        enabled: true
  metrics:
    export:
      prometheus:
        enabled: true

logging:
  level:
    root: INFO
    com.fiserv.uba: DEBUG
    org.springframework.security: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: logs/account-service.log
    max-size: 10MB
    max-history: 30

gateway:
  base-url: ${GATEWAY_BASE_URL:https://security.examplebank.com}
  client-id: ${GATEWAY_CLIENT_ID:client-id}
  client-secret: ${GATEWAY_CLIENT_SECRET:client-secret}
  scope: ${GATEWAY_SCOPE:gateway.read gateway.write}
  otp-validation-enabled: ${GATEWAY_OTP_VALIDATION_ENABLED:true}
  default-otp: ${GATEWAY_DEFAULT_OTP:123456}
  connect-timeout: 5s
  read-timeout: 20s
  retry:
    max-attempts: 3
    backoff: 300ms
  endpoints:
    application-token: /oauth2/token
    login: /authenticate
    logout: /logoutUser
    verify-token: /validateToken
    keep-alive: /keepAlive
    request-otp: /authenticate/otp
    validate-otp: /authenticate/otp/validate
    reset-password: /password
    change-password: /password/change
    create-user: /users
    update-user: /users/{userId}
    find-user: /users/search
