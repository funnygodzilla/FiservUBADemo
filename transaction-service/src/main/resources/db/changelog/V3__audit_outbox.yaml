databaseChangeLog:
  - changeSet:
      id: 3
      author: codex
      changes:
        - createTable:
            tableName: audit_outbox
            columns:
              - column: {name: id, type: bigint, autoIncrement: true, constraints: {primaryKey: true}}
              - column: {name: action, type: varchar(64)}
              - column: {name: actor, type: varchar(64)}
              - column: {name: branch_id, type: varchar(64)}
              - column: {name: drawer_id, type: varchar(64)}
              - column: {name: correlation_id, type: varchar(128)}
              - column: {name: before_state, type: varchar(4096)}
              - column: {name: after_state, type: varchar(4096)}
              - column: {name: status, type: varchar(32)}
              - column: {name: retry_count, type: int, defaultValueNumeric: 0}
              - column: {name: last_error, type: varchar(2048)}
              - column: {name: next_attempt_at, type: timestamp with time zone}
              - column: {name: created_at, type: timestamp with time zone}
